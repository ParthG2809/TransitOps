<!DOCTYPE html>
<html lang="en" class="h-full {% if theme == 'dark' %}dark{% endif %}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify OTP | TransitOps Smart Transport Operations Platform</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            light: '#fbbf24',
                            DEFAULT: '#f59e0b',
                            dark: '#d97706',
                        },
                        slate: {
                            950: '#0b0f19',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        poppins: ['Poppins', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .animated-bg {
            background: linear-gradient(-45deg, #0b0f19, #1e293b, #111827, #0f172a);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
        }
    </style>
</head>
<body class="h-full animated-bg flex items-center justify-center p-4 md:p-8 overflow-y-auto">

    <!-- Main Container -->
    <div class="relative w-full max-w-md bg-slate-900/40 dark:bg-slate-950/40 backdrop-blur-xl border border-white/10 rounded-3xl overflow-hidden shadow-2xl p-8 md:p-10">
        
        <div class="w-full space-y-6">
            <div class="text-center">
                <div class="inline-flex h-12 w-12 items-center justify-center rounded-2xl bg-brand/10 text-brand mb-4">
                    <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                    </svg>
                </div>
                
                <h3 class="font-poppins text-2xl font-extrabold text-white">Enter OTP Code</h3>
                <p class="text-xs text-slate-400 mt-2">
                    We sent a verification code to <span class="text-slate-300 font-semibold">{{ pending_email }}</span>.
                </p>
            </div>

            {% include 'partials/flash_messages.html' %}

            <!-- Helper Sandbox Notice showing the OTP -->
            <div class="p-3.5 rounded-xl border border-brand/20 bg-brand/5 text-center text-xs text-brand-light font-medium">
                Sandbox Verification OTP: <span class="font-bold tracking-widest text-white ml-1 bg-brand/20 px-2 py-0.5 rounded">{{ expected_otp }}</span>
            </div>

            <!-- Form -->
            <form action="{% url 'otp_verify' %}" method="POST" class="space-y-6">
                {% csrf_token %}
                
                <!-- OTP inputs container -->
                <div>
                    <label class="block text-center text-xs font-semibold text-slate-300 uppercase tracking-wide mb-3">Verification Code</label>
                    <div class="flex justify-between gap-2 max-w-xs mx-auto" id="otp-inputs">
                        <input type="text" name="otp_1" maxlength="1" required class="w-12 h-12 text-center text-xl font-bold rounded-xl border border-white/10 bg-slate-900/60 text-white focus:border-brand focus:outline-none focus:ring-1 focus:ring-brand transition-all">
                        <input type="text" name="otp_2" maxlength="1" required class="w-12 h-12 text-center text-xl font-bold rounded-xl border border-white/10 bg-slate-900/60 text-white focus:border-brand focus:outline-none focus:ring-1 focus:ring-brand transition-all">
                        <input type="text" name="otp_3" maxlength="1" required class="w-12 h-12 text-center text-xl font-bold rounded-xl border border-white/10 bg-slate-900/60 text-white focus:border-brand focus:outline-none focus:ring-1 focus:ring-brand transition-all">
                        <input type="text" name="otp_4" maxlength="1" required class="w-12 h-12 text-center text-xl font-bold rounded-xl border border-white/10 bg-slate-900/60 text-white focus:border-brand focus:outline-none focus:ring-1 focus:ring-brand transition-all">
                        <input type="text" name="otp_5" maxlength="1" required class="w-12 h-12 text-center text-xl font-bold rounded-xl border border-white/10 bg-slate-900/60 text-white focus:border-brand focus:outline-none focus:ring-1 focus:ring-brand transition-all">
                        <input type="text" name="otp_6" maxlength="1" required class="w-12 h-12 text-center text-xl font-bold rounded-xl border border-white/10 bg-slate-900/60 text-white focus:border-brand focus:outline-none focus:ring-1 focus:ring-brand transition-all">
                    </div>
                </div>

                <!-- Action Button -->
                <button type="submit" class="w-full flex justify-center py-3.5 px-4 border border-transparent rounded-xl text-sm font-bold text-slate-950 bg-brand hover:bg-brand-light focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand transform active:scale-95 transition-all shadow-lg shadow-brand/10">
                    Verify & Register
                </button>
            </form>
            
            <div class="text-center space-y-2">
                <p class="text-xs text-slate-500">
                    Didn't receive the code? 
                    <a href="#" onclick="alert('OTP sent again: {{ expected_otp }}')" class="text-brand hover:text-brand-light font-semibold transition-colors">Resend Code</a>
                </p>
                <div class="border-t border-white/5 my-2"></div>
                <a href="{% url 'register' %}" class="inline-block text-xs text-slate-400 hover:text-white transition-colors">Back to Registration</a>
            </div>
        </div>

    </div>

    <script>
        // Automatic focus progression for OTP inputs
        const inputs = document.querySelectorAll('#otp-inputs input');
        inputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                if (e.target.value.length === 1 && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
            });
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && e.target.value.length === 0 && index > 0) {
                    inputs[index - 1].focus();
                }
            });
        });
    </script>
</body>
</html>
