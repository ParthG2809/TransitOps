{% if messages %}
<div id="toast-container" class="fixed top-4 right-4 z-50 flex flex-col space-y-2 max-w-sm w-full">
    {% for message in messages %}
    <div class="toast-item flex items-center justify-between p-4 rounded-xl shadow-lg border transition-all duration-300 transform translate-y-0 opacity-100 
                {% if message.tags == 'success' %}bg-green-500/10 border-green-500/30 text-green-500 dark:bg-green-950/20
                {% elif message.tags == 'warning' %}bg-amber-500/10 border-amber-500/30 text-amber-500 dark:bg-amber-950/20
                {% elif message.tags == 'error' %}bg-red-500/10 border-red-500/30 text-red-500 dark:bg-red-950/20
                {% else %}bg-blue-500/10 border-blue-500/30 text-blue-500 dark:bg-blue-950/20{% endif %}"
         role="alert">
        <div class="flex items-center space-x-3">
            <!-- Icon based on tag -->
            {% if message.tags == 'success' %}
                <svg class="h-5 w-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
            {% elif message.tags == 'warning' or message.tags == 'error' %}
                <svg class="h-5 w-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>
            {% else %}
                <svg class="h-5 w-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
            {% endif %}
            
            <p class="text-xs font-semibold font-poppins leading-none">{{ message }}</p>
        </div>
        <button onclick="dismissToast(this.closest('.toast-item'))" class="ml-4 rounded-lg p-1 hover:bg-black/10 dark:hover:bg-white/10 transition-colors">
            <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
    </div>
    {% endfor %}
</div>

<script>
    function dismissToast(element) {
        element.classList.add('opacity-0', 'translate-y-[-10px]');
        setTimeout(() => {
            element.remove();
        }, 300);
    }
    
    // Auto-dismiss after 4 seconds
    document.querySelectorAll('.toast-item').forEach(item => {
        setTimeout(() => {
            dismissToast(item);
        }, 4000);
    });
</script>
{% endif %}
