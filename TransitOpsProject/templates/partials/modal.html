<!-- Reusable Modal Partial -->
<div id="global-modal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4 bg-slate-950/80 backdrop-blur-sm transition-opacity duration-300">
    <div class="relative w-full max-w-lg rounded-2xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 p-6 shadow-2xl transition-all transform scale-95 opacity-0">
        <!-- Close Button -->
        <button onclick="closeModal()" class="absolute top-4 right-4 rounded-lg p-1.5 text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 hover:text-slate-500 transition-colors">
            <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
            </svg>
        </button>
        
        <!-- Modal Title -->
        <h3 id="modal-title" class="font-poppins text-lg font-bold text-slate-900 dark:text-white mb-2">Modal Title</h3>
        
        <!-- Modal Content Container -->
        <div id="modal-body" class="text-sm text-slate-500 dark:text-slate-400 mt-2">
            Modal body content...
        </div>
    </div>
</div>

<script>
    function openModal(title, bodyHtml) {
        const modal = document.getElementById('global-modal');
        const modalContainer = modal.querySelector('.relative');
        
        document.getElementById('modal-title').innerText = title;
        document.getElementById('modal-body').innerHTML = bodyHtml;
        
        modal.classList.remove('hidden');
        setTimeout(() => {
            modalContainer.classList.remove('scale-95', 'opacity-0');
            modalContainer.classList.add('scale-100', 'opacity-100');
        }, 50);
    }
    
    function closeModal() {
        const modal = document.getElementById('global-modal');
        const modalContainer = modal.querySelector('.relative');
        
        modalContainer.classList.remove('scale-100', 'opacity-100');
        modalContainer.classList.add('scale-95', 'opacity-0');
        
        setTimeout(() => {
            modal.classList.add('hidden');
        }, 200);
    }
</script>
